<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" role="img" aria-label="Wonderfilled WD monogram">
  <defs>
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8D86B"/>
      <stop offset="40%" stop-color="#FBE89A"/>
      <stop offset="55%" stop-color="#E9B834"/>
      <stop offset="100%" stop-color="#8C620F"/>
    </linearGradient>
    <linearGradient id="goldOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE899"/>
      <stop offset="100%" stop-color="#7E5610"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <g filter="url(#logoShadow)">
    <!-- W (slanted, bolder) -->
    <path d="M14 36 L72 36 L84 138 L108 36 L156 36 L172 138 L190 36 L240 36 L208 200 L156 200 L138 110 L116 200 L60 200 Z"
          fill="url(#goldFill)" stroke="#0A0A0A" stroke-width="7" stroke-linejoin="round"/>
    <!-- D (interlocked) -->
    <path d="M218 40 L274 40 C312 40 336 70 336 120 C336 174 312 200 274 200 L218 200 Z M252 76 L252 164 L272 164 C292 164 302 152 302 120 C302 88 292 76 272 76 Z"
          fill="url(#goldFill)" stroke="#0A0A0A" stroke-width="7" stroke-linejoin="round" fill-rule="evenodd"/>
    <!-- inner double-line W highlight -->
    <path d="M28 50 L60 50 L74 132 L96 50 L150 50 L168 132 L184 50 L226 50 L200 188 L160 188 L138 96 L116 188 L70 188 Z"
          fill="none" stroke="url(#goldOuter)" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>
    <!-- inner D highlight -->
    <path d="M232 52 L272 52 C302 52 322 78 322 120 C322 162 302 188 272 188 L232 188 Z"
          fill="none" stroke="url(#goldOuter)" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>
  </g>
  <text x="340" y="56" font-family="Georgia, serif" font-size="14" fill="#F8D86B" opacity="0.85">TM</text>
</svg>
